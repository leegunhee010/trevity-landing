<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>트래비티 | 베트남 KOC 마케팅 비법서 신청</title>
<meta name="description" content="베트남 매장 사장님을 위한 KOC 마케팅 비법서 무료 신청 - 트래비티 VIETNAM" />

<!-- ===== 광고 전환 추적 (ID는 tracking.js 한 곳에서 관리) ===== -->
<script src="tracking.js"></script>
<script>initTracking();</script>

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root{
    --primary:#a23ad1;
    --primary-dark:#681d80;
    --primary-light:#edd5fb;
    --primary-50:#f7f0fc;
    --ink:#1f2937;
    --muted:#6b7280;
    --line:#e9e3ef;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Malgun Gothic",sans-serif;
    color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 18px;
    background:
      radial-gradient(800px 500px at 8% -10%, var(--primary-light) 0%, transparent 55%),
      radial-gradient(760px 520px at 100% 110%, #f3e6fb 0%, transparent 55%),
      #faf7fc;
  }

  .box{position:relative;width:100%;max-width:480px;
    animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .card{
    background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;
    box-shadow:0 30px 70px -28px rgba(104,29,128,.38), 0 6px 18px -10px rgba(0,0,0,.08);
  }

  /* ---- purple header ---- */
  .top{position:relative;padding:30px 30px 26px;color:#fff;overflow:hidden;
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)}
  .top::after{content:"";position:absolute;width:240px;height:240px;border-radius:50%;
    right:-70px;top:-90px;background:rgba(255,255,255,.12)}
  .top::before{content:"";position:absolute;width:150px;height:150px;border-radius:50%;
    right:30px;bottom:-90px;background:rgba(255,255,255,.08)}
  .logo{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
  .logo-text{font-size:23px;font-weight:800;letter-spacing:-1px;color:#fff}
  .logo-tag{font-size:10.5px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.5);
    padding:2px 8px;border-radius:999px;letter-spacing:.08em}
  .flag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;
    background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
    padding:6px 13px;border-radius:999px;margin:18px 0 14px;position:relative;z-index:1}
  h1{font-size:26px;line-height:1.34;font-weight:800;letter-spacing:-1px;position:relative;z-index:1}
  h1 .hl{color:#ffe27a}
  .sub{margin-top:12px;font-size:14px;color:rgba(255,255,255,.9);position:relative;z-index:1}

  /* ---- benefit chips ---- */
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:18px 30px 0}
  .chip{font-size:12px;font-weight:600;color:var(--primary-dark);background:var(--primary-50);
    border:1px solid var(--primary-light);padding:6px 11px;border-radius:999px}

  /* ---- form ---- */
  form{padding:18px 30px 30px;display:flex;flex-direction:column;gap:10px}
  .field{position:relative}
  input[type=text],input[type=tel],input[type=email],textarea{
    width:100%;font-family:inherit;font-size:15px;padding:13px 14px;color:var(--ink);background:#fbf9fd;
    border:1px solid #e2dae9;border-radius:11px;transition:border-color .15s,box-shadow .15s,background .15s;
  }
  input::placeholder,textarea::placeholder{color:#a79fb0}
  input:focus,textarea:focus{outline:none;border-color:var(--primary);background:#fff;
    box-shadow:0 0 0 3px var(--primary-light)}
  textarea{resize:vertical;min-height:74px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* ---- consent ---- */
  .agree{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--muted);margin-top:2px}
  .agree input{margin-top:3px;accent-color:var(--primary);width:15px;height:15px;flex:none}
  .agree a{color:var(--primary);font-weight:600;text-decoration:underline}

  button{
    margin-top:6px;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;color:#fff;
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
    padding:16px;border-radius:12px;transition:transform .15s,box-shadow .15s;
    box-shadow:0 10px 24px -8px rgba(124,58,237,.5);
  }
  button:hover{transform:translateY(-2px);box-shadow:0 16px 30px -8px rgba(124,58,237,.55)}
  button:active{transform:translateY(0)}
  .privacy{display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:11.5px;color:#9ca3af;text-align:center;margin-top:4px}

  .biz{text-align:center;font-size:11px;color:#b1aab8;margin-top:16px;line-height:1.7}
  .biz a{color:#b1aab8;text-decoration:underline}
  @media(max-width:430px){.row{grid-template-columns:1fr}.top,form{padding-left:22px;padding-right:22px}.chips{padding-left:22px;padding-right:22px}}
</style>
</head>
<body>
  <div class="box">
    <div class="card">
      <div class="top">
        <div class="logo"><span class="logo-text">trevity</span><span class="logo-tag">VIETNAM</span></div>
        <div class="flag">🇰🇷 베트남에서 사업하는 사장님께</div>
        <h1>사장님,<br><span class="hl">베트남 KOC 마케팅</span><br>비법서 무료로 받아보세요</h1>
        <p class="sub">트래비티의 V-마케팅 노하우를 한 권에 담아 보내드립니다.</p>
      </div>

      <form id="leadForm" action="https://formsubmit.co/meeneex2@gmail.com" method="POST">
        <!-- formsubmit 설정 -->
        <input type="hidden" name="_subject" value="[트래비티] KOC 비법서 신청">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="text" name="_honey" style="display:none">
        <!-- 제출 성공 후 내 도메인 thank-you 페이지로 이동(전환 발사). 값은 아래 스크립트가 자동 설정 -->
        <input type="hidden" name="_next" id="nextUrl" value="">

        <div class="field"><input type="text" name="이름" placeholder="이름" required></div>
        <div class="field"><input type="text" name="매장명" placeholder="매장명" required></div>
        <div class="row">
          <div class="field"><input type="text" name="업종" placeholder="업종 (한식당·스파 등)" required></div>
          <div class="field"><input type="tel" name="전화번호" placeholder="전화번호" required></div>
        </div>
        <div class="field"><input type="email" name="이메일" placeholder="이메일" required></div>
        <div class="field"><textarea name="추가내용" placeholder="추가 내용 (문의사항·매장 상황 등)" required></textarea></div>

        <label class="agree">
          <input type="checkbox" name="개인정보동의" value="동의" required>
          <span>개인정보 수집·이용에 동의합니다. <a href="privacy.html" target="_blank">[자세히]</a></span>
        </label>

        <button type="submit">비법서 무료로 받기 →</button>
        <p class="privacy">🔒 신청 정보는 비법서 발송·상담 안내에만 사용됩니다.</p>
      </form>
    </div>

    <p class="biz">
      트래비티(TREVITY VIETNAM) · 호치민 · 대구 · 서울<br>
      <a href="privacy.html">개인정보처리방침</a>
    </p>
  </div>

  <script>
    /* =========================================================
       신청 저장 위치
       - SHEET_ENDPOINT 가 비어 있으면 → 이메일(formsubmit)로 전송
       - Apps Script 웹앱 URL(.../exec)을 넣으면 → 구글 시트에 자동저장
         (google-apps-script/Code.gs 참고, 배포 후 URL 붙여넣기)
       ========================================================= */
    var SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxIWv2CZvl3ZmLaq7oh9s8pNQQnmhO7AG6p3YpJdISK4ZmoHQEGBlNUJcScAZEPCZ05/exec';   // ← Apps Script /exec URL

    (function(){
      var form    = document.getElementById('leadForm');
      var base    = location.href.replace(/[?#].*$/, '').replace(/[^/]*$/, '');
      var nextUrl = base + 'thanks.html';
      document.getElementById('nextUrl').value = nextUrl;   // 이메일 방식 redirect용

      /* 구글 시트 방식이 설정돼 있으면 가로채서 시트로 전송 후 thank-you 이동 */
      if (/\/exec\b/.test(SHEET_ENDPOINT)) {
        form.addEventListener('submit', function(ev){
          ev.preventDefault();
          var btn = form.querySelector('button[type=submit]');
          btn.disabled = true; btn.textContent = '전송 중…';
          fetch(SHEET_ENDPOINT, { method:'POST', mode:'no-cors', body:new FormData(form) })
            .then(function(){ location.href = nextUrl; })
            .catch(function(){ location.href = nextUrl; });
        });
      }
      /* 미설정 시: 폼이 그대로 formsubmit 으로 제출(이메일) → _next 로 thank-you 이동 */
    })();
  </script>
</body>
</html>
