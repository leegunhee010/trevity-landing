<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>트래비티 | 베트남 KOC 마케팅 비법서 신청 (개선안)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root{
    --primary:#a23ad1;--primary-dark:#681d80;--primary-light:#edd5fb;--primary-50:#f7f0fc;
    --ink:#1f2937;--muted:#6b7280;--line:#e9e3ef;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Malgun Gothic",sans-serif;
    color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 18px;
    background:
      radial-gradient(800px 500px at 8% -10%, var(--primary-light) 0%, transparent 55%),
      radial-gradient(760px 520px at 100% 110%, #f3e6fb 0%, transparent 55%),
      #faf7fc;
  }
  .box{position:relative;width:100%;max-width:480px}
  .card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;
    box-shadow:0 30px 70px -28px rgba(104,29,128,.38), 0 6px 18px -10px rgba(0,0,0,.08);}
  .top{position:relative;padding:28px 30px 24px;color:#fff;overflow:hidden;
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)}
  .top::after{content:"";position:absolute;width:240px;height:240px;border-radius:50%;
    right:-70px;top:-90px;background:rgba(255,255,255,.12)}
  .logo{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
  .logo-text{font-size:22px;font-weight:800;letter-spacing:-1px;color:#fff}
  .logo-tag{font-size:10.5px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.5);
    padding:2px 8px;border-radius:999px;letter-spacing:.08em}
  .flag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
    padding:5px 12px;border-radius:999px;margin:16px 0 12px;position:relative;z-index:1}
  h1{font-size:24px;line-height:1.36;font-weight:800;letter-spacing:-1px;position:relative;z-index:1}
  h1 .hl{color:#ffe27a}
  .sub{margin-top:11px;font-size:13.5px;color:rgba(255,255,255,.92);position:relative;z-index:1}

  /* value row: cover + bullets */
  .value{display:flex;gap:14px;padding:20px 30px 4px;align-items:center}
  .cover{flex:none;width:92px;border-radius:8px;overflow:hidden;
    box-shadow:0 10px 22px -8px rgba(104,29,128,.45);border:1px solid var(--line)}
  .cover img{display:block;width:100%}
  .benefits{flex:1;list-style:none}
  .benefits li{font-size:13px;font-weight:600;color:var(--ink);padding:4px 0 4px 22px;position:relative}
  .benefits li::before{content:"✓";position:absolute;left:0;color:var(--primary);font-weight:800}

  form{padding:14px 30px 28px;display:flex;flex-direction:column;gap:9px}
  .lbl{font-size:11.5px;font-weight:700;color:var(--muted);margin:4px 0 -2px 2px;letter-spacing:.02em}
  input[type=text],input[type=tel],input[type=email],textarea{
    width:100%;font-family:inherit;font-size:15px;padding:12px 14px;color:var(--ink);background:#fbf9fd;
    border:1px solid #e2dae9;border-radius:11px}
  input::placeholder,textarea::placeholder{color:#a79fb0}
  textarea{resize:vertical;min-height:56px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{font-size:10.5px;font-weight:600;color:#b9a9c7;margin-left:5px}
  .more{margin-top:4px;text-align:center;font-size:12.5px;font-weight:700;color:var(--primary);
    background:var(--primary-50);border:1px dashed var(--primary-light);border-radius:10px;padding:11px;cursor:pointer}
  .more span{font-weight:500;color:#b9a9c7;font-size:11px}
  .agree{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);margin-top:4px}
  .agree input{margin-top:3px;accent-color:var(--primary);width:15px;height:15px;flex:none}
  .agree a{color:var(--primary);font-weight:600;text-decoration:underline}
  button{margin-top:8px;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;color:#fff;
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
    padding:16px;border-radius:12px;box-shadow:0 10px 24px -8px rgba(124,58,237,.5)}
  .privacy{display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:11.5px;color:#9ca3af;text-align:center;margin-top:6px}
  .biz{text-align:center;font-size:11px;color:#b1aab8;margin-top:16px;line-height:1.7}
</style>
</head>
<body>
  <div class="box">
    <div class="card">
      <div class="top">
        <div class="logo"><span class="logo-text">trevity</span><span class="logo-tag">VIETNAM</span></div>
        <div class="flag">🇰🇷 베트남에서 장사하는 사장님께</div>
        <h1>베트남 손님 0명이던 매장이<br>1년 만에 <span class="hl">줄 서는 맛집</span>이 된 비결</h1>
        <p class="sub">망해가던 가게를 살린 그 방법 — KOC 마케팅 비법서, 무료로 드립니다.</p>
      </div>

      <form>
        <div class="row">
          <div><div class="lbl">이름</div><input type="text" placeholder="이름" required></div>
          <div><div class="lbl">전화번호</div><input type="tel" placeholder="전화번호" required></div>
        </div>
        <div><div class="lbl">이메일</div><input type="email" placeholder="비법서 받을 이메일" required></div>

        <div class="more">＋ 매장 정보도 남기기 <span>(선택 · 맞춤 상담용)</span></div>

        <label class="agree">
          <input type="checkbox" checked>
          <span>개인정보 수집·이용에 동의합니다. <a href="#">[자세히]</a></span>
        </label>

        <button type="button">비법서 무료로 받기 →</button>
        <p class="privacy">🔒 30초면 신청 완료 · 정보는 비법서 발송·상담에만 사용됩니다.</p>
      </form>
    </div>
    <p class="biz">트래비티(TREVITY VIETNAM) · 호치민 · 대구 · 서울</p>
  </div>
</body>
</html>
