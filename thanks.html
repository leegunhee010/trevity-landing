<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신청 완료 | 트래비티 VIETNAM</title>
<meta name="robots" content="noindex" />

<!-- ===== 광고 전환 추적 — 이 페이지 진입 = 리드 1건 ===== -->
<script src="tracking.js"></script>
<script>
  initTracking();
  /* 픽셀/태그 베이스가 로드된 뒤 전환 발사 */
  window.addEventListener('load', function(){ setTimeout(fireLead, 300); });
</script>

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root{--primary:#a23ad1;--primary-dark:#681d80;--primary-light:#edd5fb;--ink:#1f2937;--muted:#6b7280}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,"Malgun Gothic",sans-serif;
    color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:30px 18px;
    background:radial-gradient(800px 500px at 50% -10%, var(--primary-light) 0%, transparent 55%),#faf7fc}
  .card{position:relative;width:100%;max-width:440px;background:#fff;border:1px solid #e9e3ef;
    border-radius:24px;padding:46px 34px;text-align:center;
    box-shadow:0 30px 70px -28px rgba(104,29,128,.38);
    animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  .check{width:74px;height:74px;border-radius:50%;margin:0 auto 22px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 14px 30px -10px rgba(124,58,237,.55);animation:pop .5s .15s both}
  .check svg{width:36px;height:36px;stroke:#fff;stroke-width:3.5;fill:none}
  .logo-text{font-size:18px;font-weight:800;letter-spacing:-1px;color:#000}
  .logo-tag{font-size:10px;font-weight:700;color:var(--primary);border:1px solid var(--primary-light);
    background:#f7f0fc;padding:2px 7px;border-radius:999px;letter-spacing:.08em;margin-left:6px}
  h1{font-size:25px;font-weight:800;letter-spacing:-.8px;margin-top:6px}
  p{font-size:15px;color:var(--muted);margin-top:14px}
  .home{display:inline-block;margin-top:28px;font-weight:700;font-size:15px;color:#fff;text-decoration:none;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:13px 28px;border-radius:11px;
    box-shadow:0 10px 24px -8px rgba(124,58,237,.5);transition:transform .15s}
  .home:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="card">
    <div class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>
    <div><span class="logo-text">trevity</span><span class="logo-tag">VIETNAM</span></div>
    <h1>신청이 완료됐습니다 🎉</h1>
    <p>비법서와 함께 담당자가 빠르게 연락드릴게요.<br>입력하신 이메일·연락처를 확인해 주세요.</p>
    <a class="home" href="index.html">처음으로</a>
  </div>
</body>
</html>
